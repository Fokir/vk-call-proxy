services:
  scripts-updater:
    image: ghcr.io/fokir/vk-call-proxy-scripts-updater:${IMAGE_TAG:-latest}
    command:
      - --scripts-interval=${SCRIPTS_INTERVAL:-1h}
    environment:
      - CALLVPN_SCRIPTS_DIR=/var/lib/callvpn/scripts
    volumes:
      - scripts:/var/lib/callvpn/scripts
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.1"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  server:
    image: ghcr.io/fokir/vk-call-proxy:${IMAGE_TAG:-latest}
    ports:
      - "${LISTEN_PORT:-9000}:9000/udp"
    environment:
      - VPN_TOKEN=${VPN_TOKEN:-}
      - VK_CALL_LINK=${VK_CALL_LINK:-}
      - ALSO_DIRECT=${ALSO_DIRECT:-}
      - PROXY_URL=${PROXY_URL:-}
      - TURN_CONNS=${TURN_CONNS:-16}
      - SIREN_SLACK_WEBHOOK=${SIREN_SLACK_WEBHOOK:-}
      - CAPTCHA_ENDPOINT=${CAPTCHA_ENDPOINT:-http://captcha:8090}
      - CALLVPN_SCRIPTS_DIR=/var/lib/callvpn/scripts
      - CALLVPN_SCRIPTS_URL=
    volumes:
      - scripts:/var/lib/callvpn/scripts:ro
    depends_on:
      - captcha
      - scripts-updater
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-256M}
          cpus: "${CPU_LIMIT:-1.0}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  captcha:
    image: ghcr.io/fokir/vk-call-proxy-captcha:${IMAGE_TAG:-latest}
    init: true
    environment:
      - MAX_CONCURRENT=${CAPTCHA_MAX_CONCURRENT:-1}
      - CALLVPN_SCRIPTS_DIR=/var/lib/callvpn/scripts
      - CALLVPN_SCRIPTS_URL=
    volumes:
      - scripts:/var/lib/callvpn/scripts:ro
    depends_on:
      - scripts-updater
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${CAPTCHA_MEMORY_LIMIT:-512M}
          cpus: "${CAPTCHA_CPU_LIMIT:-1.0}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  scripts:
