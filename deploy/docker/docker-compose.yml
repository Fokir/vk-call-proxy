services:
  server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "9000:9000/udp"
    environment:
      - SIREN_SLACK_WEBHOOK=${SIREN_SLACK_WEBHOOK:-}
    command: ["--listen=0.0.0.0:9000"]
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
