## Development: build from source
## Usage: docker compose -f docker-compose.build.yml up --build
services:
  server:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "${LISTEN_PORT:-9000}:9000/udp"
    environment:
      - SIREN_SLACK_WEBHOOK=${SIREN_SLACK_WEBHOOK:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-256M}
          cpus: "${CPU_LIMIT:-1.0}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
