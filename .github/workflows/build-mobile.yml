name: Build Mobile Clients

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build Go AAR
        run: |
          gomobile bind -target android -androidapi 24 -o mobile/android/app/libs/bind.aar ./mobile/bind/

      - name: Build Android APK
        working-directory: mobile/android
        run: |
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleRelease || gradle assembleRelease

      - name: Sign APK
        if: github.event_name == 'push'
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_FILE" | base64 -d > keystore.jks
          apksigner sign \
            --ks keystore.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$STORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk
          mv mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk app-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: app-release.apk
        if: github.event_name == 'push'

  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build Go XCFramework
        run: |
          gomobile bind -target ios -o mobile/ios/Bind.xcframework ./mobile/bind/

      - name: Install Apple Certificate
        if: github.event_name == 'push'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$APPLE_CERTIFICATE" | base64 -d > "$CERT_PATH"
          echo "$APPLE_PROVISIONING_PROFILE" | base64 -d > "$PP_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS App
        if: github.event_name == 'push'
        run: |
          xcodebuild -project mobile/ios/CallVPN.xcodeproj \
            -scheme CallVPN \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/CallVPN.xcarchive \
            archive

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/CallVPN.xcarchive \
            -exportOptionsPlist mobile/ios/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - uses: actions/upload-artifact@v4
        with:
          name: CallVPN.ipa
          path: ${{ runner.temp }}/export/*.ipa
        if: github.event_name == 'push'
