<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --danger: #ef4444;
    --danger-hover: #f87171;
    --success: #22c55e;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px 100px;
  }

  .app {
    width: 100%;
    max-width: 560px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
  }

  .header-logo {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .instance-card {
    position: relative;
    margin-bottom: 20px;
    padding: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .instance-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .instance-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);
  }

  .btn-remove {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: 1px solid transparent;
    border-radius: 6px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    transition: all 0.15s;
  }

  .btn-remove:hover {
    border-color: var(--danger);
    color: var(--danger);
  }

  .btn-remove:disabled {
    opacity: 0.2;
    cursor: not-allowed;
    border-color: transparent;
    color: var(--text-dim);
  }

  .field {
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus {
    border-color: var(--accent);
  }

  .field input:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .input-row input {
    flex: 1;
  }

  .btn-icon {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-icon:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-icon:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-icon svg {
    width: 18px;
    height: 18px;
  }

  .token-toast {
    font-size: 11px;
    color: var(--success);
    margin-top: 4px;
    min-height: 18px;
  }

  .parsed-id {
    font-size: 12px;
    color: var(--accent);
    margin-top: 4px;
    min-height: 18px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }

  .btn {
    padding: 10px 28px;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-connect {
    background: var(--accent);
    color: white;
  }

  .btn-connect:hover:not(:disabled) {
    background: var(--accent-hover);
  }

  .btn-disconnect {
    background: var(--danger);
    color: white;
  }

  .btn-disconnect:hover:not(:disabled) {
    background: var(--danger-hover);
  }

  .status {
    font-size: 13px;
    font-weight: 500;
  }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }

  .status-dot.off { background: var(--text-dim); }
  .status-dot.on { background: var(--success); }

  .conn-info {
    margin-bottom: 14px;
    padding: 8px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    display: none;
  }

  .conn-info.visible { display: block; }

  .conn-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    margin-top: 6px;
    overflow: hidden;
  }

  .conn-bar-fill {
    height: 100%;
    background: var(--success);
    border-radius: 3px;
    transition: width 0.3s;
  }

  .conn-bar-fill.degraded { background: #f59e0b; }
  .conn-bar-fill.critical { background: var(--danger); }

  .logs-section {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .logs-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--bg);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .logs-header:hover {
    background: #0c0d14;
  }

  .logs-header-left {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
  }

  .logs-header .arrow {
    font-size: 10px;
    transition: transform 0.2s;
    color: var(--text-dim);
  }

  .logs-header .arrow.open {
    transform: rotate(90deg);
  }

  .copy-hint {
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .logs-section:hover .copy-hint {
    opacity: 1;
  }

  .copy-toast {
    font-size: 11px;
    color: var(--success);
    display: none;
  }

  .logs-body {
    display: none;
    max-height: 300px;
    overflow-y: auto;
    background: #0c0d12;
    cursor: pointer;
  }

  .logs-body.open {
    display: block;
  }

  .logs-body::-webkit-scrollbar {
    width: 6px;
  }

  .logs-body::-webkit-scrollbar-track {
    background: transparent;
  }

  .logs-body::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  .log-line {
    padding: 2px 14px;
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.6;
    color: var(--text-dim);
    word-break: break-all;
  }

  .log-line:hover {
    background: rgba(99, 102, 241, 0.08);
  }

  .logs-empty {
    padding: 20px 14px;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
  }

  .fab {
    position: fixed;
    bottom: 32px;
    right: 32px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    border: none;
    font-size: 28px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
    transition: all 0.2s;
  }

  .fab:hover {
    background: var(--accent-hover);
    transform: scale(1.08);
  }

  .fab:active {
    transform: scale(0.96);
  }
</style>
</head>

0WtWJvgy19E5CmizbzPPtHTgn/AWWHBF8+l6aJOZyxwh/1wMFUXnJW9yKheSv4iZXT4uUfmKI3Ko1JGyxB+VBX1l61PWb/2ra+cPBxx3qYWFhZR9/H8WN5YZbu+CjgAAAABJRU5ErkJggg==" alt="Call VPN">
    <h1>Call VPN Server</h1>
  </div>
  <div id="instances"></div>
</div>

<button class="fab" onclick="addInstance()" title="Add server instance">+</button>

<script>
const linkRe = /vk\.com\/call\/join\/([A-Za-z0-9_-]+)/;

// Per-instance state.
const state = [];

function parseLink(input) {
  const m = input.match(linkRe);
  return m ? m[1] : input.trim();
}

function el(id, idx) {
  return document.getElementById(id + '_' + idx);
}

function createInstanceHTML(idx) {
  return `
    <div class="instance-card" id="card_${idx}">
      <div class="instance-header">
        <span class="instance-title">Server #${idx + 1}</span>
        <button class="btn-remove" id="removeBtn_${idx}" onclick="removeInstance(${idx})" title="Remove instance">&times;</button>
      </div>
      <div class="field">
        <label>VK Call Link</label>
        <input type="text" id="link_${idx}" placeholder="https://vk.com/call/join/... or call ID" autocomplete="off" spellcheck="false">
        <div class="parsed-id" id="parsed_${idx}"></div>
      </div>
      <div class="field">
        <label>Auth Token</label>
        <div class="input-row">
          <input type="password" id="token_${idx}" placeholder="Token (or set VPN_TOKEN env var)" autocomplete="off" spellcheck="false">
          <button class="btn-icon" id="copyTokenBtn_${idx}" onclick="copyToken(${idx})" title="Copy token">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
          <button class="btn-icon" id="genTokenBtn_${idx}" onclick="generateToken(${idx})" title="Generate token & copy">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
            </svg>
          </button>
        </div>
        <div class="token-toast" id="tokenToast_${idx}"></div>
      </div>
      <div class="controls">
        <button class="btn btn-connect" id="connectBtn_${idx}" onclick="toggleConnection(${idx})">Connect</button>
        <span class="status">
          <span class="status-dot off" id="statusDot_${idx}"></span>
          <span id="statusText_${idx}">Disconnected</span>
        </span>
      </div>
      <div class="conn-info" id="connInfo_${idx}">
        <span id="connText_${idx}">Connections: —</span>
        <div class="conn-bar">
          <div class="conn-bar-fill" id="connBarFill_${idx}" style="width: 0%"></div>
        </div>
      </div>
      <div class="logs-section">
        <div class="logs-header" onclick="toggleLogs(${idx})">
          <div class="logs-header-left">
            <span class="arrow" id="logsArrow_${idx}">&#9654;</span>
            <span>Logs</span>
            <span class="log-count" id="logCount_${idx}"></span>
          </div>
          <span class="copy-hint" id="copyHint_${idx}">click logs to copy</span>
          <span class="copy-toast" id="copyToast_${idx}">Copied!</span>
        </div>
        <div class="logs-body" id="logsBody_${idx}" onclick="copyLogs(${idx})">
          <div class="logs-empty" id="logsEmpty_${idx}">No logs yet</div>
        </div>
      </div>
    </div>`;
}

function initInstanceState(idx) {
  if (!state[idx]) {
    state[idx] = { connected: false, logsOpen: false, logLines: [], evtSource: null, statusInterval: null };
  }
}

function renderInstances(configs) {
  const container = document.getElementById('instances');
  container.innerHTML = '';
  state.length = 0;

  configs.forEach((cfg, idx) => {
    initInstanceState(idx);
    container.insertAdjacentHTML('beforeend', createInstanceHTML(idx));

    if (cfg.call_link) el('link', idx).value = cfg.call_link;
    if (cfg.auth_token) el('token', idx).value = cfg.auth_token;

    el('link', idx).addEventListener('input', e => {
      const id = parseLink(e.target.value);
      const parsed = el('parsed', idx);
      if (id && id !== e.target.value.trim()) {
        parsed.textContent = 'ID: ' + id;
      } else {
        parsed.textContent = '';
      }
    });
    el('link', idx).dispatchEvent(new Event('input'));
  });

  updateRemoveButtons();
}

function updateRemoveButtons() {
  const total = state.length;
  state.forEach((s, idx) => {
    const btn = el('removeBtn', idx);
    if (btn) btn.disabled = total <= 1 || s.connected;
  });
}

function setStatus(idx, on, text) {
  const s = state[idx];
  s.connected = on;
  el('statusDot', idx).className = 'status-dot ' + (on ? 'on' : 'off');
  el('statusText', idx).textContent = text;
  el('link', idx).disabled = on;
  el('token', idx).disabled = on;
  el('copyTokenBtn', idx).disabled = on;
  el('genTokenBtn', idx).disabled = on;

  const btn = el('connectBtn', idx);
  if (on) {
    btn.textContent = 'Disconnect';
    btn.className = 'btn btn-disconnect';
  } else {
    btn.textContent = 'Connect';
    btn.className = 'btn btn-connect';
  }
  btn.disabled = false;
  updateRemoveButtons();
}

async function toggleConnection(idx) {
  const s = state[idx];
  const btn = el('connectBtn', idx);
  btn.disabled = true;

  if (s.connected) {
    setStatus(idx, true, 'Disconnecting...');
    try {
      await fetch('/api/disconnect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: idx })
      });
    } catch(e) {}
    setStatus(idx, false, 'Disconnected');
    stopStatusPolling(idx);
  } else {
    const link = el('link', idx).value.trim();
    if (!link) {
      btn.disabled = false;
      return;
    }
    setStatus(idx, false, 'Connecting...');
    btn.disabled = true;
    try {
      const res = await fetch('/api/connect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: idx, link, token: el('token', idx).value })
      });
      if (res.ok) {
        setStatus(idx, true, 'Connected');
        connectSSE(idx);
        startStatusPolling(idx);
      } else {
        const data = await res.json().catch(() => ({}));
        setStatus(idx, false, data.error || 'Connection failed');
      }
    } catch(e) {
      setStatus(idx, false, 'Connection failed');
    }
  }
}

function toggleLogs(idx) {
  const s = state[idx];
  s.logsOpen = !s.logsOpen;
  el('logsBody', idx).className = 'logs-body' + (s.logsOpen ? ' open' : '');
  el('logsArrow', idx).className = 'arrow' + (s.logsOpen ? ' open' : '');
  if (s.logsOpen) {
    el('logsBody', idx).scrollTop = el('logsBody', idx).scrollHeight;
  }
}

function addLogLine(idx, text) {
  const s = state[idx];
  s.logLines.push(text);
  const body = el('logsBody', idx);
  el('logsEmpty', idx).style.display = 'none';

  const div = document.createElement('div');
  div.className = 'log-line';
  div.textContent = text;
  body.appendChild(div);

  el('logCount', idx).textContent = '(' + s.logLines.length + ')';

  if (body.scrollHeight - body.scrollTop - body.clientHeight < 80) {
    body.scrollTop = body.scrollHeight;
  }
}

function copyLogs(idx) {
  const s = state[idx];
  if (s.logLines.length === 0) return;
  navigator.clipboard.writeText(s.logLines.join('\n')).then(() => {
    const toast = el('copyToast', idx);
    const hint = el('copyHint', idx);
    hint.style.display = 'none';
    toast.style.display = 'inline';
    setTimeout(() => {
      toast.style.display = 'none';
      hint.style.display = '';
    }, 1500);
  });
}

function copyToken(idx) {
  const token = el('token', idx).value;
  if (!token) {
    el('tokenToast', idx).textContent = 'No token to copy';
    setTimeout(() => el('tokenToast', idx).textContent = '', 2000);
    return;
  }
  navigator.clipboard.writeText(token).then(() => {
    el('tokenToast', idx).textContent = 'Token copied to clipboard';
    setTimeout(() => el('tokenToast', idx).textContent = '', 2000);
  });
}

function generateToken(idx) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  const arr = new Uint8Array(40);
  crypto.getRandomValues(arr);
  const token = Array.from(arr, b => chars[b % chars.length]).join('');
  el('token', idx).value = token;
  el('token', idx).type = 'text';
  navigator.clipboard.writeText(token).then(() => {
    el('tokenToast', idx).textContent = 'Token generated & copied to clipboard';
    setTimeout(() => {
      el('tokenToast', idx).textContent = '';
      el('token', idx).type = 'password';
    }, 3000);
  });
}

function updateConnInfo(idx, sessions) {
  const info = el('connInfo', idx);
  const text = el('connText', idx);
  const bar = el('connBarFill', idx);

  if (!sessions || sessions.length === 0) {
    info.className = 'conn-info';
    return;
  }

  info.className = 'conn-info visible';
  let totalActive = 0, totalConns = 0;
  sessions.forEach(s => {
    totalActive += s.active_conns;
    totalConns += s.total_conns;
  });

  text.textContent = 'MUX connections: ' + totalActive + ' / ' + totalConns +
    ' (' + sessions.length + ' session' + (sessions.length > 1 ? 's' : '') + ')';

  const pct = totalConns > 0 ? Math.round(totalActive / totalConns * 100) : 0;
  bar.style.width = pct + '%';
  bar.className = 'conn-bar-fill' + (pct < 30 ? ' critical' : pct < 70 ? ' degraded' : '');
}

function startStatusPolling(idx) {
  const s = state[idx];
  if (s.statusInterval) return;
  s.statusInterval = setInterval(async () => {
    try {
      const data = await fetch('/api/status').then(r => r.json());
      if (data.instances && data.instances[idx]) {
        const ist = data.instances[idx];
        if (ist.sessions) updateConnInfo(idx, ist.sessions);
        if (!ist.connected && s.connected) {
          setStatus(idx, false, 'Disconnected (server stopped)');
          stopStatusPolling(idx);
        }
      }
    } catch(e) {}
  }, 3000);
}

function stopStatusPolling(idx) {
  const s = state[idx];
  if (s.statusInterval) {
    clearInterval(s.statusInterval);
    s.statusInterval = null;
  }
  el('connInfo', idx).className = 'conn-info';
}

function connectSSE(idx) {
  const s = state[idx];
  if (s.evtSource) s.evtSource.close();
  s.logLines = [];
  el('logsBody', idx).querySelectorAll('.log-line').forEach(e => e.remove());
  el('logsEmpty', idx).style.display = '';
  el('logCount', idx).textContent = '';

  s.evtSource = new EventSource('/api/logs?id=' + idx);
  s.evtSource.onmessage = e => addLogLine(idx, e.data);
  s.evtSource.onerror = () => {
    fetch('/api/status').then(r => r.json()).then(data => {
      if (data.instances && data.instances[idx] && !data.instances[idx].connected && s.connected) {
        setStatus(idx, false, 'Disconnected (server stopped)');
      }
    }).catch(() => {});
  };
}

async function addInstance() {
  try {
    const res = await fetch('/api/instances/add', { method: 'POST' });
    const data = await res.json();
    const idx = data.id;
    initInstanceState(idx);
    const container = document.getElementById('instances');
    container.insertAdjacentHTML('beforeend', createInstanceHTML(idx));

    el('link', idx).addEventListener('input', e => {
      const id = parseLink(e.target.value);
      const parsed = el('parsed', idx);
      if (id && id !== e.target.value.trim()) {
        parsed.textContent = 'ID: ' + id;
      } else {
        parsed.textContent = '';
      }
    });

    updateRemoveButtons();
    el('card', idx).scrollIntoView({ behavior: 'smooth', block: 'end' });
  } catch(e) {}
}

async function removeInstance(idx) {
  const s = state[idx];
  if (s.connected) return;

  if (!confirm('Remove Server #' + (idx + 1) + '?')) return;

  try {
    const res = await fetch('/api/instances/remove', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: idx })
    });
    if (!res.ok) return;
  } catch(e) { return; }

  // Close SSE if any.
  if (s.evtSource) s.evtSource.close();
  if (s.statusInterval) clearInterval(s.statusInterval);

  // Re-render everything from current config.
  const cfg = await fetch('/api/config').then(r => r.json());
  renderInstances(cfg.instances || [{}]);

  // Restore connected states from server.
  try {
    const st = await fetch('/api/status').then(r => r.json());
    if (st.instances) {
      st.instances.forEach((ist, i) => {
        if (ist.connected) {
          setStatus(i, true, 'Connected');
          connectSSE(i);
          startStatusPolling(i);
          if (ist.sessions) updateConnInfo(i, ist.sessions);
          if (!state[i].logsOpen) toggleLogs(i);
        }
      });
    }
  } catch(e) {}
}

// Initialize.
(async () => {
  // Load config.
  let configs = [{}];
  try {
    const cfg = await fetch('/api/config').then(r => r.json());
    if (cfg.instances && cfg.instances.length > 0) {
      configs = cfg.instances;
    }
  } catch(e) {}

  renderInstances(configs);

  // Check current status.
  try {
    const st = await fetch('/api/status').then(r => r.json());
    if (st.instances) {
      st.instances.forEach((ist, idx) => {
        if (ist.connected && state[idx]) {
          setStatus(idx, true, 'Connected');
          connectSSE(idx);
          startStatusPolling(idx);
          if (ist.sessions) updateConnInfo(idx, ist.sessions);
          if (!state[idx].logsOpen) toggleLogs(idx);
        }
      });
    }
  } catch(e) {}
})();
</script>
