# coturn configuration for integration tests
# Static credentials (no external auth)

listening-port=3478
relay-ip=10.77.0.10
listening-ip=0.0.0.0

# Long-term credential mechanism
lt-cred-mech
user=testuser:testpassword

# Realm (required for long-term credentials)
realm=test.local

# No TLS/DTLS
no-tls
no-dtls

# Allow all relay traffic within Docker network
min-port=49152
max-port=65535

# Verbose logging for debugging
verbose

# Disable CLI
no-cli
