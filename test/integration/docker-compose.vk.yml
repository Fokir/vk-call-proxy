services:
  target:
    build:
      context: ../..
      dockerfile: test/integration/Dockerfile
      target: target
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ../..
      dockerfile: test/integration/Dockerfile
      target: server
    command: ["--signal=0.0.0.0:9443", "--psk=test-secret"]
    depends_on:
      target:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9443/health || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 20

  client:
    build:
      context: ../..
      dockerfile: test/integration/Dockerfile
      target: client
    command:
      - "--link=${VK_CALL_LINK}"
      - "--signal=http://server:9443/signal"
      - "--psk=test-secret"
      - "--n=2"
      - "--tcp=true"
      - "--bind=0.0.0.0"
    depends_on:
      server:
        condition: service_healthy
    restart: "on-failure:5"

  test-runner:
    build:
      context: ../..
      dockerfile: test/integration/Dockerfile
      target: runner
    depends_on:
      client:
        condition: service_started
