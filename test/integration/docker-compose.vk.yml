services:
  target:
    build:
      context: ../..
      dockerfile: test/integration/Dockerfile
      target: target
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ../..
      dockerfile: test/integration/Dockerfile
      target: server
    command: ["--listen=0.0.0.0:9000"]
    ports:
      - "9000:9000/udp"
    depends_on:
      target:
        condition: service_healthy

  client:
    build:
      context: ../..
      dockerfile: test/integration/Dockerfile
      target: client
    command:
      - "--link=${VK_CALL_LINK}"
      - "--server=server:9000"
      - "--n=2"
      - "--tcp=true"
      - "--bind=0.0.0.0"
    depends_on:
      server:
        condition: service_started
    restart: "on-failure:5"

  test-runner:
    build:
      context: ../..
      dockerfile: test/integration/Dockerfile
      target: runner
    depends_on:
      client:
        condition: service_started
