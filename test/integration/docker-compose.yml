services:
  coturn:
    image: coturn/coturn:latest
    volumes:
      - ./coturn.conf:/etc/coturn/turnserver.conf:ro
    networks:
      testnet:
        ipv4_address: 10.77.0.10
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/tmp/turnserver.pid"]
      interval: 2s
      timeout: 3s
      retries: 10

  target:
    build:
      context: ../..
      dockerfile: test/integration/Dockerfile
      target: target
    networks:
      testnet:
        ipv4_address: 10.77.0.20
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ../..
      dockerfile: test/integration/Dockerfile
      target: server
    command: ["--listen=0.0.0.0:9000"]
    depends_on:
      coturn:
        condition: service_healthy
      target:
        condition: service_healthy
    networks:
      testnet:
        ipv4_address: 10.77.0.30

  client:
    build:
      context: ../..
      dockerfile: test/integration/Dockerfile
      target: client
    command:
      - "--link=test"
      - "--server=10.77.0.30:9000"
      - "--n=2"
      - "--tcp=true"
      - "--bind=0.0.0.0"
    environment:
      - TURN_HOST=10.77.0.10
      - TURN_PORT=3478
      - TURN_USERNAME=testuser
      - TURN_PASSWORD=testpassword
    depends_on:
      server:
        condition: service_started
    restart: "on-failure:5"
    networks:
      testnet:
        ipv4_address: 10.77.0.40

  test-runner:
    build:
      context: ../..
      dockerfile: test/integration/Dockerfile
      target: runner
    depends_on:
      client:
        condition: service_started
    networks:
      testnet:
        ipv4_address: 10.77.0.50

networks:
  testnet:
    driver: bridge
    ipam:
      config:
        - subnet: 10.77.0.0/24
